<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobTrack Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="bg-indigo-700 text-white p-4 flex justify-between">

<h1 class="text-2xl font-bold">
JobTrack Pro
</h1>

<span>Remote Job Tracker</span>

</header>

<main class="max-w-7xl mx-auto p-6">

<!-- DASHBOARD STATS -->
<section class="grid md:grid-cols-4 gap-4 mb-6">

<div class="card">
<h3>Applied</h3>
<p id="appliedCount">0</p>
</div>

<div class="card">
<h3>Interview</h3>
<p id="interviewCount">0</p>
</div>

<div class="card">
<h3>Offers</h3>
<p id="offerCount">0</p>
</div>

<div class="card">
<h3>Rejected</h3>
<p id="rejectedCount">0</p>
</div>

</section>

<!-- ADD JOB -->
<section class="bg-white p-6 rounded shadow mb-6">

<h2 class="text-xl font-bold mb-4">Add Job</h2>

<form id="jobForm" class="grid md:grid-cols-4 gap-4">

<input type="text" id="company" placeholder="Company"
class="border p-2">

<input type="text" id="role" placeholder="Role"
class="border p-2">

<select id="status" class="border p-2">

<option>Applied</option>
<option>Interview</option>
<option>Offer</option>
<option>Rejected</option>

</select>

<button class="bg-indigo-600 text-white rounded">
Add Job
</button>

</form>

</section>

<!-- SEARCH -->
<section class="mb-4">

<input type="text" id="searchInput"
placeholder="Search jobs..."
class="border p-2 w-full">

</section>

<!-- JOB LIST -->
<section id="jobList" class="grid md:grid-cols-3 gap-4"></section>

</main>

<script src="script.js"></script>

</body>

</html>
